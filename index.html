<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>windbnb</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./SCRIPTS/style.css" />
    <script type="module" src="./SCRIPTS/main.js"></script>
</head>
<body class="bg-white dark:bg-stone-900 text-[#333333] dark:text-stone-100 font-['Montserrat'] min-h-screen transition-colors duration-200">

    <div id="modal-busqueda" class="fixed inset-0 bg-black/40 z-50 hidden">
        <div class="bg-white dark:bg-stone-900 w-full p-4 md:px-20 md:py-10 shadow-lg min-h-[50vh]">
            
            <div class="grid grid-cols-1 md:grid-cols-3 border border-[#F2F2F2] dark:border-stone-700 rounded-2xl shadow-sm mb-8 bg-white dark:bg-stone-800">
                <div class="px-6 py-3 border-b md:border-b-0 md:border-r border-[#F2F2F2] dark:border-stone-700 hover:bg-stone-50 dark:hover:bg-stone-700 rounded-t-2xl md:rounded-l-2xl md:rounded-tr-none">
                    <label class="block text-[9px] font-extrabold uppercase text-stone-800 dark:text-stone-400 tracking-widest">Location</label>
                    <input type="text" id="input-ciudad" placeholder="Add location" class="w-full bg-transparent outline-none text-sm text-stone-800 dark:text-stone-100 placeholder-stone-400">
                </div>
                <div class="px-6 py-3 border-b md:border-b-0 md:border-r border-[#F2F2F2] dark:border-stone-700 hover:bg-stone-50 dark:hover:bg-stone-700">
                    <label class="block text-[9px] font-extrabold uppercase text-stone-800 dark:text-stone-400 tracking-widest">Guests</label>
                    <input type="text" id="input-huespedes" placeholder="Add guests" readonly class="w-full bg-transparent outline-none text-sm text-stone-800 dark:text-stone-100 placeholder-stone-400">
                </div>
                <div class="hidden md:flex items-center justify-center p-2">
                    <button id="btn-buscar-desktop" class="bg-[#EB5757] text-white px-6 py-2.5 rounded-2xl font-bold text-sm flex items-center gap-2 shadow-sm hover:bg-[#d64b4b] transition-colors cursor-pointer">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                        Search
                    </button>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-8 items-start">
                
                <div class="space-y-4 px-4">
                    <div class="ciudad-opcion flex items-center gap-3 cursor-pointer text-stone-600 dark:text-stone-300 hover:text-stone-900 dark:hover:text-white" data-ciudad="helsinki">
                        <svg class="w-4 h-4 text-stone-500" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M5.05 4.05a7 7 0 119.9 9.9L10 18.9l-4.95-4.95a7 7 0 010-9.9zM10 11a2 2 0 100-4 2 2 0 000 4z" clip-rule="evenodd"></path></svg>
                        <span class="text-sm capitalize">Helsinki</span>
                    </div>
                    <div class="ciudad-opcion flex items-center gap-3 cursor-pointer text-stone-600 dark:text-stone-300 hover:text-stone-900 dark:hover:text-white" data-ciudad="turku">
                        <svg class="w-4 h-4 text-stone-500" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M5.05 4.05a7 7 0 119.9 9.9L10 18.9l-4.95-4.95a7 7 0 010-9.9zM10 11a2 2 0 100-4 2 2 0 000 4z" clip-rule="evenodd"></path></svg>
                        <span class="text-sm capitalize">Turku</span>
                    </div>
                    <div class="ciudad-opcion flex items-center gap-3 cursor-pointer text-stone-600 dark:text-stone-300 hover:text-stone-900 dark:hover:text-white" data-ciudad="oulu">
                        <svg class="w-4 h-4 text-stone-500" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M5.05 4.05a7 7 0 119.9 9.9L10 18.9l-4.95-4.95a7 7 0 010-9.9zM10 11a2 2 0 100-4 2 2 0 000 4z" clip-rule="evenodd"></path></svg>
                        <span class="text-sm capitalize">Oulu</span>
                    </div>
                    <div class="ciudad-opcion flex items-center gap-3 cursor-pointer text-stone-600 dark:text-stone-300 hover:text-stone-900 dark:hover:text-white" data-ciudad="vaasa">
                        <svg class="w-4 h-4 text-stone-500" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M5.05 4.05a7 7 0 119.9 9.9L10 18.9l-4.95-4.95a7 7 0 010-9.9zM10 11a2 2 0 100-4 2 2 0 000 4z" clip-rule="evenodd"></path></svg>
                        <span class="text-sm capitalize">Vaasa</span>
                    </div>
                </div>

                <div class="space-y-6 px-4 md:border-l md:border-stone-100 dark:md:border-stone-800">
                    <div>
                        <h3 class="font-bold text-sm text-stone-800 dark:text-stone-200">Adults</h3>
                        <p class="text-stone-400 text-xs mb-3">Ages 13 or above</p>
                        <div class="flex items-center gap-4">
                            <button id="btn-restar-adultos" class="w-6 h-6 rounded border border-stone-400 dark:border-stone-600 text-stone-600 dark:text-stone-400 flex items-center justify-center font-bold cursor-pointer hover:bg-stone-100 dark:hover:bg-stone-800">-</button>
                            <span id="contador-adultos" class="font-bold text-sm w-4 text-center text-stone-800 dark:text-stone-100">0</span>
                            <button id="btn-sumar-adultos" class="w-6 h-6 rounded border border-stone-400 dark:border-stone-600 text-stone-600 dark:text-stone-400 flex items-center justify-center font-bold cursor-pointer hover:bg-stone-100 dark:hover:bg-stone-800">+</button>
                        </div>
                    </div>
                    <div>
                        <h3 class="font-bold text-sm text-stone-800 dark:text-stone-200">Children</h3>
                        <p class="text-stone-400 text-xs mb-3">Ages 2-12</p>
                        <div class="flex items-center gap-4">
                            <button id="btn-restar-ninos" class="w-6 h-6 rounded border border-stone-400 dark:border-stone-600 text-stone-600 dark:text-stone-400 flex items-center justify-center font-bold cursor-pointer hover:bg-stone-100 dark:hover:bg-stone-800">-</button>
                            <span id="contador-ninos" class="font-bold text-sm w-4 text-center text-stone-800 dark:text-stone-100">0</span>
                            <button id="btn-sumar-ninos" class="w-6 h-6 rounded border border-stone-400 dark:border-stone-600 text-stone-600 dark:text-stone-400 flex items-center justify-center font-bold cursor-pointer hover:bg-stone-100 dark:hover:bg-stone-800">+</button>
                        </div>
                    </div>
                </div>
                </div>
            </div>
        </div>
    </div>

    <div class="max-w-312.5 mx-auto px-4 md:px-8 pt-8 pb-12">
        
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center gap-6 mt-2 mb-12 relative z-40">
            <div class="flex justify-between w-full md:w-auto items-center gap-4">
                <div class="flex items-center text-[#EB5757] font-bold text-xl cursor-pointer">
                    <svg class="w-6 h-6 mr-1" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 2L2 22H22L12 2Z" fill="#EB5757"/>
                    </svg>
                    windbnb
                </div>

                <button id="btn-dark-mode" class="w-10 h-10 flex items-center justify-center rounded-full border border-stone-200 dark:border-stone-700 bg-stone-50 dark:bg-stone-800 hover:bg-stone-100 dark:hover:bg-stone-700 text-lg shadow-sm cursor-pointer" title="Cambiar Tema">
                    🌓
                </button>
            </div>

            <div id="btn-abrir-modal" class="w-full md:w-auto shadow-[0px_1px_6px_rgba(0,0,0,0.1)] dark:shadow-[0px_1px_6px_rgba(0,0,0,0.5)] rounded-2xl flex border border-[#F2F2F2] dark:border-stone-700 bg-white dark:bg-stone-800 cursor-pointer overflow-hidden">
                <div class="px-6 py-4 grow text-center text-sm text-stone-400 dark:text-stone-500 border-r border-[#F2F2F2] dark:border-stone-700">Add location</div>
                <div class="px-6 py-4 grow text-center text-sm text-stone-400 dark:text-stone-500 border-r border-[#F2F2F2] dark:border-stone-700">Add guests</div>
                <div class="px-4 py-4 flex items-center justify-center text-[#EB5757]">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                </div>
            </div>
        </header>

        <main>
            <div class="flex justify-between items-center mt-12 mb-8">
                <h1 class="text-2xl font-bold text-stone-800 dark:text-stone-100">Stays in Finland</h1>
                <span id="total-estancias" class="text-sm text-stone-500 dark:text-stone-400 font-medium">Cargando...</span>
            </div>

            <div id="lista-estancias" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
                <p class="text-stone-500 col-span-full text-center">Cargando estancias...</p>
            </div>
        </main>
    </div>

   
</body>
</html>
