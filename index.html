<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Windbnb</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="./style.css" rel="stylesheet" />
  </head>
  <!-- hola -->
  <body class="bg-white text-[#333333] font-['Montserrat']">
    
    <div id="modal-busqueda" class="fixed inset-0 bg-black/40 z-50 hidden">
      <div class="bg-white w-full p-4 md:px-20 md:py-10 shadow-lg min-h-[50vh]">
        
        <div class="flex justify-between items-center md:hidden mb-4">
          <span class="font-bold text-xs uppercase text-stone-800">Edit your search</span>
          <button id="btn-cerrar-modal" class="text-xl font-bold text-stone-600">✕</button>
        </div>

        <div class="flex flex-col md:flex-row border border-[#F2F2F2] rounded-2xl shadow-sm mb-8">
          
          <div class="flex-1 px-6 py-3 border-b md:border-b-0 md:border-r border-[#F2F2F2] hover:bg-stone-50 rounded-t-2xl md:rounded-l-2xl md:rounded-tr-none cursor-pointer">
            <label class="block text-[9px] font-extrabold uppercase text-stone-800 tracking-widest">Location</label>
            <input type="text" id="input-ciudad" placeholder="Add location" class="w-full bg-transparent outline-none text-sm text-stone-600 placeholder-stone-400 mt-1">
          </div>
          
          <div class="flex-1 px-6 py-3 border-b md:border-b-0 md:border-r border-[#F2F2F2] hover:bg-stone-50 cursor-pointer">
            <label class="block text-[9px] font-extrabold uppercase text-stone-800 tracking-widest">Guests</label>
            <input type="text" id="input-huespedes" placeholder="Add guests" readonly class="w-full bg-transparent outline-none text-sm text-stone-600 placeholder-stone-400 mt-1 cursor-pointer">
          </div>
          
          <div class="hidden md:flex flex-1 items-center justify-center">
            <button id="btn-buscar-desktop" class="bg-[#EB5757] text-white px-6 py-3 rounded-2xl font-bold text-sm flex items-center gap-2 hover:bg-red-600 transition-colors shadow-sm cursor-pointer">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
              Search
            </button>
          </div>

        </div>
<div class="px-6 md:px-0 md:w-1/3 md:ml-[33%] mt-8">
          
          <div class="mb-10">
            <h3 class="font-bold text-sm text-[#333333]">Adults</h3>
            <p class="text-[#BDBDBD] text-sm mb-3">Ages 13 or above</p>
            <div class="flex items-center gap-4">
              <button id="btn-restar-adultos" class="w-6 h-6 rounded border border-[#828282] text-[#828282] flex items-center justify-center hover:bg-stone-100 transition-colors cursor-pointer">-</button>
              <span id="contador-adultos" class="font-bold text-sm text-[#333333]">0</span>
              <button id="btn-sumar-adultos" class="w-6 h-6 rounded border border-[#828282] text-[#828282] flex items-center justify-center hover:bg-stone-100 transition-colors cursor-pointer">+</button>
            </div>
          </div>

          <div>
            <h3 class="font-bold text-sm text-[#333333]">Children</h3>
            <p class="text-[#BDBDBD] text-sm mb-3">Ages 2-12</p>
            <div class="flex items-center gap-4">
              <button id="btn-restar-ninos" class="w-6 h-6 rounded border border-[#828282] text-[#828282] flex items-center justify-center hover:bg-stone-100 transition-colors cursor-pointer">-</button>
              <span id="contador-ninos" class="font-bold text-sm text-[#333333]">0</span>
              <button id="btn-sumar-ninos" class="w-6 h-6 rounded border border-[#828282] text-[#828282] flex items-center justify-center hover:bg-stone-100 transition-colors cursor-pointer">+</button>
            </div>
          </div>

        </div>
       
        <div class="md:hidden flex justify-center mt-12">
          <button id="btn-buscar-mobile" class="bg-[#EB5757] text-white px-8 py-3 rounded-2xl font-bold text-sm flex items-center gap-2 shadow-sm cursor-pointer">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
            Search
          </button>
        </div>

      </div>
    </div>

    <div class="max-w-[1250px] mx-auto px-4 md:px-8 pt-8 pb-12">
        
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center gap-8 md:gap-0 mt-8 mb-8 relative z-40">
            
            <div class="flex items-center text-[#EB5757] font-bold text-xl cursor-pointer">
                <svg class="w-6 h-6 mr-1" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 2L2 22H22L12 2Z" fill="#EB5757"/> 
                </svg>
                windbnb
            </div>

            <div id="btn-abrir-modal" class="w-full md:w-auto shadow-[0px_1px_6px_rgba(0,0,0,0.1)] rounded-2xl flex border border-[#F2F2F2] overflow-hidden cursor-pointer hover:shadow-md transition-shadow bg-white">
                <div class="px-4 py-4 md:py-3 border-r border-[#F2F2F2] flex-grow text-center md:text-left text-[#BDBDBD] text-sm">Add location</div>
                <div class="px-4 py-4 md:py-3 border-r border-[#F2F2F2] flex-grow text-center md:text-left text-[#BDBDBD] text-sm">Add guests</div>
                <div class="px-4 py-4 md:py-3 flex items-center justify-center text-[#EB5757]">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                </div>
            </div>
        </header>

        <div class="flex justify-between items-center mt-12 mb-8">
            <h1 class="text-2xl font-bold">Stays in Finland</h1>
            <span class="text-sm text-[#4F4F4F] font-medium">12+ stays</span>
        </div>

        <main id="lista-estancias" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
            <p class="text-stone-500">Cargando estancias...</p>
        </main>

    </div>

    <script type="module" src="./SCRIPTS/main.js"></script>
  </body>
</html>
